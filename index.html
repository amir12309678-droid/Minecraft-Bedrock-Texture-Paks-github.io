      margin: 0;

    h1 {
      text-align: center;
      padding: 20px;

    .container {
      display: grid;

      padding: 15px;

    .card {
      background: #1e293b;
      border-radius: 15px;
      padding: 10px;
      text-align: center;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
