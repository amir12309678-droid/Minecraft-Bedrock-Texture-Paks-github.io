<!DOCTYPE html>
<html>
<head>
<title>Minecraft PvP Packs</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {margin:0;font-family:Arial;background:#0f172a;color:white;}
header {background:#020617;padding:15px;text-align:center;font-size:22px;font-weight:bold;}

nav {text-align:center;padding:10px;background:#1e293b;}
nav a {color:white;margin:0 10px;text-decoration:none;}

.search {text-align:center;padding:10px;}
.search input {width:90%;padding:10px;border-radius:10px;border:none;}

.categories {display:flex;overflow:auto;padding:10px;gap:10px;}
.cat {background:#1e293b;padding:8px 15px;border-radius:20px;cursor:pointer;}
.cat.active {background:#22c55e;color:black;font-weight:bold;}

.container {display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px;padding:12px;}

.card {background:#1e293b;padding:15px;border-radius:15px;}
button {margin-top:10px;padding:10px;width:100%;border:none;border-radius:10px;background:#22c55e;font-weight:bold;}

footer {text-align:center;padding:20px;background:#020617;margin-top:20px;font-size:14px;color:#aaa;}
</style>
</head>

<body>

<header>🔥 Minecraft PvP Packs</header>

<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="privacy.html">Privacy</a>
</nav>

<p style="text-align:center;padding:10px;">
Discover the best Minecraft Bedrock PvP texture packs including crystal PvP, FPS boost packs, and more.
</p>

<div class="search">
<input type="text" id="search" placeholder="Search packs...">
</div>

<div class="categories">
<div class="cat active" onclick="filterCategory('all')">All</div>
<div class="cat" onclick="filterCategory('crystal')">Crystal</div>
<div class="cat" onclick="filterCategory('fps')">FPS</div>
<div class="cat" onclick="filterCategory('bedwars')">Bedwars</div>
</div>

<div class="container" id="container"></div>

<script>
const packs = [];

for(let i=1;i<=45;i++){
  packs.push({
    name:"PvP Pack "+i,
    desc:"High quality Minecraft PvP texture pack with smooth FPS and clean visuals for better gameplay.",
    cat: i%3==0 ? "crystal" : (i%3==1 ? "fps" : "bedwars")
  });
}

let current="all";

function show(){
  let c=document.getElementById("container");
  let s=document.getElementById("search").value.toLowerCase();
  c.innerHTML="";

  packs.forEach(p=>{
    if((current==="all"||p.cat===current) && p.name.toLowerCase().includes(s)){
      c.innerHTML+=`
      <div class="card">
        <h3>${p.name}</h3>
        <p>${p.desc}</p>
        <a href="https://mcpedl.com/"><button>Download</button></a>
      </div>`;
    }
  });
}

function filterCategory(cat){
  current=cat;
  document.querySelectorAll(".cat").forEach(x=>x.classList.remove("active"));
  event.target.classList.add("active");
  show();
}

document.getElementById("search").addEventListener("input",show);
show();
</script>

<footer>
© 2026 Minecraft PvP Packs | Not affiliated with Mojang
</footer>

</body>
</html>
